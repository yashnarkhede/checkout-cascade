# Checkout Cascade — SuperPlane canvas (Phase 2 incident-commander + Phase 3 fixer)
# Build target: app "golden-mission" (id 808eccf8-d68a-49f2-a484-095668addbe7).
# CLI writes 500 on this org, so build in the WEB UI: paste this into the canvas YAML view, or
# rebuild via the Agent. ONE canvas holds TWO independent graphs.
#
# Fill these placeholders (all from the UI / read-only CLI):
#   REPLACE_OPENAI_INTEGRATION_ID  -> OpenAI integration (Azure baseURL .../openai/v1); `superplane integrations list`
#   REPLACE_GITHUB_INTEGRATION_ID  -> GitHub integration; `superplane integrations list`
#   REPLACE_GITHUB_REPO_RESOURCE   -> repo resource NAME (NOT owner/repo); `superplane integrations list-resources --type repository`
#   (LLM secret) create OpenAI integration; (Action secret) AZURE_DEEPSEEK_KEY lives in the GitHub repo, not here.
#
# Verified schemas: openai.textPrompt{model,input}->data.text/default; if{expression}->true/false;
#   http{method,url,...}->data.body/success,failure; display{message,color};
#   github.onIssueComment{repository,contentFilter}; github.runWorkflow{repository,workflowFile,ref,inputs[{name,value}]}->passed,failed;
#   github.createIssue{repository,title,body,labels}->data.number/data.html_url; github.createIssueComment{repository,issueNumber,body}.

apiVersion: v1
kind: Canvas
metadata:
  id: 808eccf8-d68a-49f2-a484-095668addbe7
  name: golden-mission
spec:
  nodes:
    # ---------- GRAPH 1: incident commander (Phase 2) + file issue (Phase 3 bridge) ----------
    - id: trigger-schedule
      name: Every Minute
      type: TYPE_TRIGGER
      component: schedule
      configuration: { type: minutes, minutesInterval: 1 }
      position: { x: 120, y: 200 }

    - id: fetch-checkout
      name: Fetch Checkout Status
      type: TYPE_ACTION
      component: http
      configuration:
        method: GET
        url: "https://checkout-cascade-1.onrender.com/status"
        timeoutSeconds: 10
      position: { x: 700, y: 200 }

    - id: fetch-payment
      name: Fetch Payment Status
      type: TYPE_ACTION
      component: http
      configuration:
        method: GET
        url: "https://checkout-cascade.onrender.com/status"
        timeoutSeconds: 10
      position: { x: 1280, y: 200 }

    - id: incident-gate
      name: Incident?
      type: TYPE_ACTION
      component: if
      configuration:
        expression: "$['Fetch Checkout Status'].data.body.error_rate > 0.2"
      position: { x: 1860, y: 200 }

    - id: ai-root-cause
      name: AI Root Cause
      type: TYPE_ACTION
      component: openai.textPrompt
      integration:
        id: "REPLACE_OPENAI_INTEGRATION_ID"
      configuration:
        model: DeepSeek-V4-Pro
        input: >-
          You are an SRE incident commander. You are given two JSON /status payloads, one from
          checkout-service and one from payment-service. checkout-service only knows that calls to
          payment-service timed out; the TRUE root cause is in payment-service (e.g. a high
          db_query_ms p95 from a slow database query). Write a crisp 3-4 sentence incident summary
          stating the user-facing SYMPTOM and the REAL root cause with specific numbers
          (error_rate, latency_ms.p95, db_query_ms.p95), then one recommended resilience change.


          checkout-service /status: {{ $['Fetch Checkout Status'].data.body }}


          payment-service /status: {{ $['Fetch Payment Status'].data.body }}
      position: { x: 2440, y: 200 }

    - id: show-incident
      name: Incident Summary
      type: TYPE_ACTION
      component: display
      configuration:
        color: red
        message: "{{ $['AI Root Cause'].data.text }}"
      position: { x: 3020, y: 120 }

    # Phase 3 bridge: file a GitHub issue with the diagnosis (a human then comments "/fix",
    # or add an optional createIssueComment "/fix" node for full autonomy).
    - id: file-issue
      name: File Incident Issue
      type: TYPE_ACTION
      component: github.createIssue
      integration:
        id: "REPLACE_GITHUB_INTEGRATION_ID"
      configuration:
        repository: "REPLACE_GITHUB_REPO_RESOURCE"
        title: "[incident] checkout failing — payment slow DB"
        labels: [incident]
        body: |-
          ## Auto-filed by SuperPlane incident commander

          {{ $['AI Root Cause'].data.text }}

          ### Suggested fix (resilience)
          Comment `/fix make checkout degrade gracefully when payment-service is slow (shorten the
          payment timeout and return a clear 'try again' instead of hanging)` to let the agent open a PR.

          <details><summary>Evidence</summary>

          checkout /status: {{ $['Fetch Checkout Status'].data.body }}

          payment /status: {{ $['Fetch Payment Status'].data.body }}
          </details>
      position: { x: 3020, y: 320 }

    # ---------- GRAPH 2: the "/fix" fixer (Phase 3) ----------
    - id: fix-trigger
      name: On /fix Comment
      type: TYPE_TRIGGER
      component: github.onIssueComment
      integration:
        id: "REPLACE_GITHUB_INTEGRATION_ID"
      configuration:
        repository: "REPLACE_GITHUB_REPO_RESOURCE"
        contentFilter: "^/fix"
      position: { x: 120, y: 760 }

    - id: ack-comment
      name: Ack Working
      type: TYPE_ACTION
      component: github.createIssueComment
      integration:
        id: "REPLACE_GITHUB_INTEGRATION_ID"
      configuration:
        repository: "REPLACE_GITHUB_REPO_RESOURCE"
        issueNumber: "{{ root().data.issue.number }}"
        body: "🤖 On it — DeepSeek is reading the code and will open a PR shortly."
      position: { x: 700, y: 760 }

    - id: run-fix
      name: Run AI Fix Workflow
      type: TYPE_ACTION
      component: github.runWorkflow
      integration:
        id: "REPLACE_GITHUB_INTEGRATION_ID"
      configuration:
        repository: "REPLACE_GITHUB_REPO_RESOURCE"
        workflowFile: "ai-fix.yml"
        ref: "main"
        inputs:
          - { name: issue_number, value: "{{ root().data.issue.number }}" }
      position: { x: 1280, y: 760 }

    - id: dispatch-failed
      name: Dispatch Failed
      type: TYPE_ACTION
      component: github.createIssueComment
      integration:
        id: "REPLACE_GITHUB_INTEGRATION_ID"
      configuration:
        repository: "REPLACE_GITHUB_REPO_RESOURCE"
        issueNumber: "{{ root().data.issue.number }}"
        body: "⚠️ Couldn't dispatch the AI fix workflow — check the Actions tab."
      position: { x: 1860, y: 880 }

  edges:
    # Graph 1
    - { sourceId: trigger-schedule, targetId: fetch-checkout, channel: default }
    - { sourceId: fetch-checkout,   targetId: fetch-payment,  channel: success }
    - { sourceId: fetch-payment,    targetId: incident-gate,  channel: success }
    - { sourceId: incident-gate,    targetId: ai-root-cause,  channel: "true" }
    - { sourceId: ai-root-cause,    targetId: show-incident,  channel: default }
    - { sourceId: ai-root-cause,    targetId: file-issue,     channel: default }
    # Graph 2
    - { sourceId: fix-trigger, targetId: ack-comment,     channel: default }
    - { sourceId: ack-comment, targetId: run-fix,         channel: default }
    - { sourceId: run-fix,     targetId: dispatch-failed, channel: failed }
