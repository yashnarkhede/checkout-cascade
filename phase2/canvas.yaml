# Phase 2 — Incident Commander canvas (FINAL — schemas verified against techWizard org, CLI v0.26.0)
#
# Build target: the existing empty app "golden-mission" (id below). The org's CLI WRITE path
# returns 500, so apply this via the SuperPlane WEB UI (paste into the canvas YAML/code view,
# or use the Agent prompt in phase2/BUILD-IN-UI.md). No Slack / no external account:
# the AI incident summary is shown IN the SuperPlane UI by the "Incident Summary" display node.
#
# Before it runs, in the UI create an OpenAI integration pointed at your Azure Foundry endpoint:
#   Integrations -> Add -> OpenAI
#     - API key  = your Azure Foundry key (ROTATE the old one first; store as a secret)
#     - Base URL = https://aarthian-demo-resource.services.ai.azure.com/openai/v1
#   DeepSeek-V4-Pro then appears in the model dropdown. Put the integration id in the AI node below
#   (`superplane integrations list`, or the integration's page in the UI).
#
# URLs are filled in:  payment = checkout-cascade.onrender.com, checkout = checkout-cascade-1.onrender.com
# openai.textPrompt: config {model (integration-resource dropdown), input}; output at data.text; channel default.
#
# Verified schemas (via `superplane index ... --output json`):
#   http: {method,url,authorization{type,credential=secret-key {secret,key}},headers[{name,value}],
#          contentType,json,successCodes(string),timeoutSeconds}; channels success/failure; response at data.body (parsed JSON).
#   if:  {expression}; channels true/false.   schedule: {type:minutes,minutesInterval}.   display: {message,color}.

apiVersion: v1
kind: Canvas
metadata:
  id: 808eccf8-d68a-49f2-a484-095668addbe7   # golden-mission
  name: golden-mission
spec:
  nodes:
    - id: trigger-schedule
      name: Every Minute
      type: TYPE_TRIGGER
      component: schedule
      configuration:
        type: minutes
        minutesInterval: 1
      position: { x: 120, y: 200 }

    - id: fetch-checkout
      name: Fetch Checkout Status
      type: TYPE_ACTION
      component: http
      configuration:
        method: GET
        url: "https://checkout-cascade-1.onrender.com/status"   # checkout-service
        timeoutSeconds: 10
      position: { x: 720, y: 200 }

    - id: fetch-payment
      name: Fetch Payment Status
      type: TYPE_ACTION
      component: http
      configuration:
        method: GET
        url: "https://checkout-cascade.onrender.com/status"     # payment-service
        timeoutSeconds: 10
      position: { x: 1320, y: 200 }

    - id: incident-gate
      name: Incident?
      type: TYPE_ACTION
      component: if
      configuration:
        expression: "$['Fetch Checkout Status'].data.body.error_rate > 0.2"
      position: { x: 1920, y: 200 }

    - id: ai-root-cause
      name: AI Root Cause
      type: TYPE_ACTION
      component: openai.textPrompt
      integration:
        id: "REPLACE_OPENAI_INTEGRATION_ID"   # OpenAI integration (Azure baseURL); get id from `superplane integrations list` or the UI
      configuration:
        model: DeepSeek-V4-Pro                # integration-resource dropdown — appears once the integration is connected
        input: >-
          You are an SRE incident commander. You are given two JSON /status payloads, one from
          checkout-service and one from payment-service. checkout-service only knows that calls to
          payment-service timed out; the TRUE root cause is in payment-service (e.g. a high
          db_query_ms p95 from a slow database query). Write a crisp 3-4 sentence incident summary
          that states the user-facing SYMPTOM and the REAL root cause, citing specific numbers
          (error_rate, latency_ms.p95, db_query_ms.p95). End with a one-line recommended action.


          checkout-service /status: {{ $['Fetch Checkout Status'].data.body }}


          payment-service /status: {{ $['Fetch Payment Status'].data.body }}
      position: { x: 2520, y: 200 }

    - id: show-incident
      name: Incident Summary
      type: TYPE_ACTION
      component: display
      configuration:
        color: red
        message: "{{ $['AI Root Cause'].data.text }}"
      position: { x: 3120, y: 200 }

  edges:
    - { sourceId: trigger-schedule, targetId: fetch-checkout, channel: default }
    - { sourceId: fetch-checkout,   targetId: fetch-payment,  channel: success }
    - { sourceId: fetch-payment,    targetId: incident-gate,  channel: success }
    - { sourceId: incident-gate,    targetId: ai-root-cause,  channel: "true" }
    - { sourceId: ai-root-cause,    targetId: show-incident,  channel: default }
